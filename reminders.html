<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>www.wasel/reminders.com</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-pK6Y6PtMqb1TVy2pF6y6qXVl+OekjjSgi8PZ5o5qIcRfuv1I1j5k7c4lFh2RZB1S5f6x+4YkLZqQ5K5P5KT3eg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#E9E4EC;font-family:'Poppins',sans-serif;color:#333;display:flex;flex-direction:column;align-items:center;padding:40px 0;}
    .url-bar{width:100%;background:#ececec;padding:8px 16px;font-size:14px;color:#555;border:1px solid #ccc;border-radius:8px;text-align:center;margin-bottom:40px;}
    h1{font-size:60px;font-weight:700;color:#2c2c3a;align-self:flex-start;margin-left:12%;margin-bottom:60px;}
    .cards{width:75%;max-width:900px;display:flex;flex-direction:column;gap:40px;}
    .card{background:white;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.08);padding:24px;display:flex;align-items:center;gap:24px;}
    .card img{width:120px;height:120px;border-radius:12px;object-fit:cover;flex-shrink:0;}
    .card-content{flex:1;}
    .card-content h2{font-size:22px;color:#333;margin-bottom:8px;}
    .card-content p{color:#777;font-size:16px;}
    .card .fa-bell{font-size:30px;color:#000;}
    @media(max-width:640px){
      h1{font-size:40px;margin-left:10%;margin-bottom:40px;}
      .cards{width:90%;}
      .card{flex-direction:column;align-items:flex-start;}
      .card img{margin-bottom:16px;}
      .card .fa-bell{align-self:flex-end;}
    }
  </style>
</head>
<body>
  <div class="url-bar">www.wasel/reminders.com</div>
  <h1>Your Reminders</h1>
  <div class="cards">
    <div class="card">
      <img src="https://via.placeholder.com/120" alt="Banan event">
      <div class="card-content">
        <h2>Saudi International Handcrafts Week (Banan)</h2>
        <p>Coming up in two days</p>
      </div>
      <i class="fa-solid fa-bell"></i>
    </div>
    <div class="card">
      <img src="https://via.placeholder.com/120" alt="Diriyah Season">
      <div class="card-content">
        <h2>Diriyah Season</h2>
        <p>Coming up in 7 days</p>
      </div>
      <i class="fa-solid fa-bell"></i>
    </div>
  </div>
</body>
</html>
